name: Retired tap contract checks

on:
  pull_request: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "Kandelo/test-workflow-trust.sh"
      - "Kandelo/test-workflow-trust.rb"

permissions:
  contents: read

jobs:
  retired-tap-trust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.4"
      - name: Validate retired tap trust boundaries
        run: bash Kandelo/test-workflow-trust.sh
